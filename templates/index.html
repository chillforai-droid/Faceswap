<!DOCTYPE html>
<html>
<head>
<title>Face Swap Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

.container {
  max-width: 400px;
  margin: auto;
  padding: 20px;
}

input {
  margin: 10px;
}

button {
  background: #22c55e;
  padding: 10px;
  border: none;
  width: 100%;
  color: white;
  border-radius: 8px;
}

img {
  width: 100%;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 Face Swap Tool</h2>

  <input type="file" id="file1"><br>
  <input type="file" id="file2"><br>

  <button onclick="swap()">Swap</button>

  <p id="loading"></p>
  <img id="result">

</div>

<script>
async function swap() {
  let f1 = document.getElementById("file1").files[0];
  let f2 = document.getElementById("file2").files[0];

  let form = new FormData();
  form.append("file1", f1);
  form.append("file2", f2);

  document.getElementById("loading").innerText = "⏳ Processing...";

  let res = await fetch("/swap", {
    method: "POST",
    body: form
  });

  let blob = await res.blob();
  document.getElementById("result").src = URL.createObjectURL(blob);

  document.getElementById("loading").innerText = "";
}
</script>

</body>
</html>
