<!DOCTYPE html>
<html>
<head>
<title>AI Face Swap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.box {
  border: 2px dashed #38bdf8;
  padding: 20px;
  margin: 10px 0;
  border-radius: 12px;
}

button {
  background: #22c55e;
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-size: 16px;
  color: white;
}

img {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

.loader {
  display: none;
}
</style>
</head>

<body>

<div class="container">
  <h2>🔥 AI Face Swap</h2>

  <div class="box">
    <input type="file" id="file1">
    <p>Upload Face Image</p>
  </div>

  <div class="box">
    <input type="file" id="file2">
    <p>Upload Target Image</p>
  </div>

  <button onclick="swap()">Swap Face</button>

  <p class="loader" id="loading">⏳ Processing...</p>

  <img id="result">
  
  <br><br>
  <a id="download" style="display:none;" download="result.jpg">
    <button>Download Result</button>
  </a>

</div>

<script>
async function swap() {
  let f1 = document.getElementById("file1").files[0];
  let f2 = document.getElementById("file2").files[0];

  let form = new FormData();
  form.append("file1", f1);
  form.append("file2", f2);

  document.getElementById("loading").style.display = "block";

  let res = await fetch("/swap", {
    method: "POST",
    body: form
  });

  let blob = await res.blob();
  let url = URL.createObjectURL(blob);

  document.getElementById("result").src = url;
  document.getElementById("download").href = url;
  document.getElementById("download").style.display = "block";

  document.getElementById("loading").style.display = "none";
}
</script>

</body>
</html>
