<!DOCTYPE html>
<html>
<head>
  <title>Face Swap Tool 🔥</title>
</head>
<body style="text-align:center;font-family:sans-serif;">

<h1>🔥 AI Face Swap Tool</h1>

<input type="file" id="file1"><br><br>
<input type="file" id="file2"><br><br>

<label>Strength:</label>
<input type="range" id="strength" min="0" max="1" step="0.1" value="1">
<br><br>

<button onclick="swap()">Swap Face</button>

<br><br>

<img id="result" width="300"/>

<script>
async function swap(){
  const f1 = document.getElementById("file1").files[0];
  const f2 = document.getElementById("file2").files[0];
  const strength = document.getElementById("strength").value;

  const form = new FormData();
  form.append("file1", f1);
  form.append("file2", f2);
  form.append("strength", strength);

  const res = await fetch("https://faceswap-lkk8.onrender.com/swap", {
    method: "POST",
    body: form
  });

  const blob = await res.blob();
  document.getElementById("result").src = URL.createObjectURL(blob);
}
</script>

</body>
</html>
